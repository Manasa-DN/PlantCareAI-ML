services:
  - type: web
    name: plantcareai-ml
    env: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app
    envVars:
      - key: HF_MODEL_API_URL
        value: https://manasadn161-plant-disease-model.hf.space/predict
