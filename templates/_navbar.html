<div class="navbar">
    <a href="{{ url_for('home') }}" class="brand-mark">PlantCare AI</a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <div class="nav-links" id="site-nav">
        <a href="{{ url_for('home') }}">{{ ui.nav_home }}</a>
        <a href="{{ url_for('upload') }}">{{ ui.nav_detect }}</a>
        <a href="{{ url_for('store') }}">{{ ui.nav_store }}</a>
        <a href="{{ url_for('schemes') }}">{{ ui.nav_schemes }}</a>
        <a href="{{ url_for('dashboard') }}">{{ ui.nav_dashboard }}</a>
        <a href="{{ url_for('about') }}">{{ ui.nav_about }}</a>
        <a href="{{ url_for('contact') }}">{{ ui.nav_contact }}</a>
    </div>
</div>

<div class="top-strip">
    <div class="top-strip-left">
        <span>{{ ui.helpline_label }}</span>
        <strong>{{ ui.helpline_number }}</strong>
    </div>
    <div class="lang-pills" aria-label="Language">
        <a href="{{ url_for('set_language', code='te') }}" class="lang-pill{% if lang_code == 'te' %} active{% endif %}">Telugu</a>
        <a href="{{ url_for('set_language', code='en') }}" class="lang-pill{% if lang_code == 'en' %} active{% endif %}">English</a>
        <a href="{{ url_for('set_language', code='hi') }}" class="lang-pill{% if lang_code == 'hi' %} active{% endif %}">Hindi</a>
        <a href="{{ url_for('set_language', code='kn') }}" class="lang-pill{% if lang_code == 'kn' %} active{% endif %}">Kannada</a>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const toggle = document.querySelector(".nav-toggle");
    const nav = document.getElementById("site-nav");
    if (!toggle || !nav) return;

    function closeMenu() {
        nav.classList.remove("open");
        toggle.classList.remove("open");
        toggle.setAttribute("aria-expanded", "false");
    }

    toggle.addEventListener("click", function () {
        const willOpen = !nav.classList.contains("open");
        nav.classList.toggle("open", willOpen);
        toggle.classList.toggle("open", willOpen);
        toggle.setAttribute("aria-expanded", willOpen ? "true" : "false");
    });

    nav.querySelectorAll("a").forEach(function (link) {
        link.addEventListener("click", closeMenu);
    });

    window.addEventListener("resize", function () {
        if (window.innerWidth > 700) closeMenu();
    });
});
</script>
