<!DOCTYPE html>
<html>
<head>
    <title>Upload Leaf Image</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="navbar">
    <h2>🌿 PlantCare AI</h2>
    <div>
        <a href="/">Home</a>
        <a href="/store">Store</a>
        <a href="/dashboard">Dashboard</a>
    </div>
</div>

<div class="hero">
    <h1>{{ ui.upload_title }}</h1>
    <p>{{ ui.upload_subtitle }}</p>
</div>

<div class="glass-card" style="max-width: 480px; margin: 0 auto 80px; text-align: center;">
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <!-- Leaf image -->
        <input type="file" name="file" required style="margin-bottom: 20px; color: white;">
        <br>
        <!-- Location for weather‑based rain probability -->
        <input
            type="text"
            name="city"
            placeholder="Enter city / village name"
            required
            style="margin-bottom: 20px; width: 100%; padding: 10px; border-radius: 8px; border: none;"
        >
        <br>
        <button type="submit" class="btn">Analyze Leaf</button>
    </form>
</div>

{% include "_chat_widget.html" %}

</body>
</html>
